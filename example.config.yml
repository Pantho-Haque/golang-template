# Demo Configuration File for Prism Project
# This file demonstrates the expected YAML structure for the application configuration

app:
  port: "8080"

postgres:
  host: "localhost"
  port: 5432
  user: "prism_user"
  password: "prism_password"
  db: "prism_db"
  max_idle_conn: 10
  max_open_conn: 100
  conn_max_lifetime: 3600

redis:
  host: "localhost"
  port: 6379
  db: 0

beatbox:
  url: "https://api.beatbox.example.com"

sentry:
  key: ""
  environment: "development"
  debug: true

# Uncomment when DemoProvider is enabled
# demo_provider:
#   base_url: "https://api.demo-provider.example.com"
#   request_timeout: 5000
#   max_retry: 3
